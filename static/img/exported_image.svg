<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 立体渐变（模拟光影，增加立体感） -->
    <!-- 右侧主大球渐变（左上亮、右下暗） -->
    <radialGradient id="bigMainGrad" cx="35%" cy="35%" r="85%" fx="35%" fy="35%">
      <stop offset="0%" stop-color="#87E8DE" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#4A90E2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0052d9" stop-opacity="0.08"/>
    </radialGradient>
    <!-- 左侧小球渐变（右上亮、左下暗） -->
    <radialGradient id="smallGrad" cx="65%" cy="65%" r="70%" fx="65%" fy="65%">
      <stop offset="0%" stop-color="#66ccff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#436fea" stop-opacity="0.1"/>
    </radialGradient>
    <!-- 中层气泡渐变（不同光影角度） -->
    <radialGradient id="midGrad1" cx="25%" cy="25%" r="75%" fx="25%" fy="25%">
      <stop offset="0%" stop-color="#99E5F0" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#5B9EF5" stop-opacity="0.09"/>
    </radialGradient>
    <radialGradient id="midGrad2" cx="75%" cy="75%" r="75%" fx="75%" fy="75%">
      <stop offset="0%" stop-color="#7DD8E6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#3A80E0" stop-opacity="0.07"/>
    </radialGradient>
    <!-- 轮廓渐变（模拟玻璃边框） -->
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B2F0E8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4A90E2" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- 背景层气泡（增加深度，立体底层） -->
  <circle cx="450" cy="100" r="90" fill="url(#bigMainGrad)" stroke="none"/>

  <!-- 中层气泡群（多数量，不同大小，增加层次感） -->
  <circle cx="300" cy="70" r="60" fill="url(#midGrad1)" stroke="none"/>
  <circle cx="190" cy="130" r="35" fill="url(#midGrad2)" stroke="none"/>
  <circle cx="150" cy="60" r="20" fill="url(#midGrad2)" stroke="none"/>
  <circle cx="320" cy="140" r="45" fill="url(#midGrad1)" stroke="none"/>

  
  <!-- 轮廓气泡群（玻璃质感，强化立体） -->
  <circle cx="480" cy="80" r="30" fill="none" stroke="url(#strokeGrad)" stroke-width="1.8"/>
  <circle cx="100" cy="130" r="18" fill="none" stroke="url(#strokeGrad)" stroke-width="1.2"/>
  <circle cx="380" cy="130" r="22" fill="none" stroke="#4A90E2" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="200" cy="90" r="15" fill="none" stroke="#87E8DE" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="430" cy="140" r="12" fill="none" stroke="#66ccff" stroke-width="1" stroke-opacity="0.2"/>

  <!-- 高光小点（模拟气泡反光，提升立体感） -->
  <circle cx="420" cy="85" r="8" fill="#ffffff" fill-opacity="0.5" stroke="none"/>
  <circle cx="110" cy="90" r="5" fill="#ffffff" fill-opacity="0.45" stroke="none"/>
  <circle cx="390" cy="100" r="4" fill="#ffffff" fill-opacity="0.4" stroke="none"/>
  <circle cx="130" cy="110" r="3" fill="#ffffff" fill-opacity="0.35" stroke="none"/>
  <circle cx="300" cy="120" r="2" fill="#ffffff" fill-opacity="0.3" stroke="none"/>
  <circle cx="510" cy="110" r="2" fill="#ffffff" fill-opacity="0.3" stroke="none"/>
  <circle cx="170" cy="120" r="1.5" fill="#ffffff" fill-opacity="0.25" stroke="none"/>
</svg>
