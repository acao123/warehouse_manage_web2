  </defs>

  <!-- 地震波形 -->
  <path d="M 30 220 Q 180 220, 190 220 T 200 220 T 210 180 T 220 120 T 230 180 T 240 220 T 250 180 T 260 120 T 270 180 T 280 220 T 290 180 T 300 80 T 310 180 T 320 220 T 330 180 T 340 100 T 350 180 T 360 220 T 370 180 T 380 140 T 390 180 T 400 220 T 410 180 T 420 200 T 430 180 T 440 140 T 450 180 T 460 220 T 470  "
        stroke="#4a6fe3" stroke-width="8" fill="none" stroke-linecap="round"/>

