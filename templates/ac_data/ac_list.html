<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC栅格数据管理</title>
    <link rel="stylesheet" href="/static/layui/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/gov-theme.css">
</head>
<body>
    <div style="padding: 15px;">
        <!-- 搜索栏和上传按钮 -->
        <div class="gov-search-card layui-form" style="margin-bottom: 15px;">
            <div class="layui-inline">
                <input type="text" id="searchAcName" placeholder="文件名称" class="layui-input">
            </div>
            <div class="layui-inline">
                <input type="text" id="searchAcLocalName" placeholder="文件本地名称" class="layui-input">
            </div>
            <div class="layui-inline">
                <input type="text" id="searchStartLongitude" placeholder="起始经度" class="layui-input">
            </div>
            <div class="layui-inline">
                <input type="text" id="searchEndLongitude" placeholder="结束经度" class="layui-input">
            </div>
            <div class="layui-inline">
                <input type="text" id="searchStartLatitude" placeholder="起始纬度" class="layui-input">
            </div>
            <div class="layui-inline">
                <input type="text" id="searchEndLatitude" placeholder="结束纬度" class="layui-input">
            </div>
            <div class="layui-inline">
                <button class="layui-btn" onclick="searchAcData()">
                    <i class="layui-icon layui-icon-search"></i> 搜索
                </button>
                <button class="layui-btn layui-btn-primary" onclick="resetSearch()">
                    <i class="layui-icon layui-icon-refresh"></i> 重置
                </button>
                <button type="button" class="layui-btn layui-btn-normal" id="uploadBtn">
                    <i class="layui-icon layui-icon-upload"></i> 上传AC文件
                </button>
            </div>
        </div>
        
        <!-- 数据表格 -->
        <table class="layui-hide" id="acTable" lay-filter="acTable"></table>
    </div>

    <!-- 操作列按钮模板 -->
    <script type="text/html" id="toolbarTpl">
        <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
    </script>

    <script src="/static/layui/layui/layui.js"></script>
    <script src="/static/js/jquery-3.6.0.min.js"></script>
    <script>
        // 全局设置：让所有 $.post / $.ajax 自动携带 CSRF token
        function getCookie(name) {
            var cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                var cookies = document.cookie.split(';');
                for (var i = 0; i < cookies.length; i++) {
                    var cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        $.ajaxSetup({
            beforeSend: function(xhr, settings) {
                if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type)) {
                    xhr.setRequestHeader("X-CSRFToken", getCookie('csrftoken'));
                }
            }
        });

        layui.use(['table', 'layer', 'upload'], function(){
            var table = layui.table;
            var layer = layui.layer;
            var upload = layui.upload;
            
            // 渲染表格
            var tableIns = table.render({
                elem: '#acTable',
                url: '/ac/data/list/data/',
                page: true,
                height: 'full-70',
                cols: [[
                    {field: 'id', title: 'ID', width: 80, sort: true},
                    {field: 'ac_name', title: '文件名称', width: 200},
                    {field: 'ac_local_name', title: '文件本地名称', width: 300},
                    {field: 'start_longitude', title: '起始经度', width: 120},
                    {field: 'end_longitude', title: '结束经度', width: 120},
                    {field: 'start_latitude', title: '起始纬度', width: 120},
                    {field: 'end_latitude', title: '结束纬度', width: 120},
                    {field: 'created_at', title: '创建时间', width: 180},
                    {fixed: 'right', title: '操作', toolbar: '#toolbarTpl', width: 150}
                ]]
            });
            
            // 文件上传
            upload.render({
                elem: '#uploadBtn',
                url: '/ac/data/upload/',
                accept: 'file',
                exts: 'tif',
                size: 204800, // 200MB = 200 * 1024 KB
                before: function(obj){
                    layer.load(); // 显示加载动画
                },
                done: function(res){
                    layer.closeAll('loading'); // 关闭加载动画
                    if(res.code === 0){
                        layer.msg('上传成功');
                        tableIns.reload(); // 刷新表格
                    } else {
                        layer.msg(res.msg || '上传失败');
                    }
                },
                error: function(){
                    layer.closeAll('loading');
                    layer.msg('上传出错');
                }
            });
            
            // 监听工具条
            table.on('tool(acTable)', function(obj){
                var data = obj.data;
                if(obj.event === 'edit'){
                    // 编辑功能
                    layer.prompt({
                        formType: 0,
                        value: data.ac_name,
                        title: '修改文件名称',
                        area: ['400px', '200px']
                    }, function(value, index){
                        if(!value.trim()){
                            layer.msg('文件名称不能为空');
                            return;
                        }
                        $.post('/ac/data/edit/', {
                            id: data.id,
                            ac_name: value
                        }, function(res){
                            if(res.code === 0){
                                layer.msg('修改成功');
                                tableIns.reload();
                                layer.close(index);
                            } else {
                                layer.msg(res.msg || '修改失败');
                            }
                        });
                    });
                } else if(obj.event === 'del'){
                    // 删除功能
                    layer.confirm('确定删除该AC文件吗？删除后将无法恢复！', {
                        icon: 3,
                        title: '删除确认'
                    }, function(index){
                        $.post('/ac/data/delete/', {id: data.id}, function(res){
                            if(res.code === 0){
                                layer.msg('删除成功');
                                tableIns.reload();
                            } else {
                                layer.msg(res.msg || '删除失败');
                            }
                        });
                        layer.close(index);
                    });
                }
            });
            
            // 搜索功能
            window.searchAcData = function() {
                tableIns.reload({
                    where: {
                        ac_name: $('#searchAcName').val(),
                        ac_local_name: $('#searchAcLocalName').val(),
                        start_longitude: $('#searchStartLongitude').val(),
                        end_longitude: $('#searchEndLongitude').val(),
                        start_latitude: $('#searchStartLatitude').val(),
                        end_latitude: $('#searchEndLatitude').val()
                    },
                    page: {
                        curr: 1
                    }
                });
            };
            
            // 重置搜索
            window.resetSearch = function() {
                $('#searchAcName').val('');
                $('#searchAcLocalName').val('');
                $('#searchStartLongitude').val('');
                $('#searchEndLongitude').val('');
                $('#searchStartLatitude').val('');
                $('#searchEndLatitude').val('');
                tableIns.reload({
                    where: {},
                    page: {
                        curr: 1
                    }
                });
            };
        });
    </script>
</body>
</html>
