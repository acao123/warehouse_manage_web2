<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震滑坡灾害评估系统 - 登录</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/logo_new.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/logo_new.png">
    <link rel="stylesheet" href="/static/layui/layui/css/layui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            overflow: hidden;
        }

        /* ─── Background layers ─── */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        #map-svg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.9;
            object-fit: cover;
        }

        /* ─── Page layout ─── */
        .main-content {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px 40px;
            padding-bottom: 80px;
        }

        .page-card {
            display: flex;
            align-items: stretch;
            gap: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(43,114,239,0.12), 0 0 0 1px rgba(43,114,239,0.12);
            max-width: 960px;
            width: 100%;
        }

        /* ─── Left info panel ─── */
        .info-panel {
            background: #ffffff;
            border-right: 1px solid #e8f0fe;
            padding: 44px 36px;
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 26px;
        }

        .sys-header {
            text-align: center;
        }
        .sys-icon {
            width: 64px; height: 64px;
            margin: 0 auto 14px;
            background: radial-gradient(circle, #e8f2fb 0%, #d0e4f5 100%);
            border: 2px solid #2b72ef;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .sys-icon svg { width: 38px; height: 38px; }
        .sys-title {
            font-size: 20px;
            font-weight: 700;
            color: #003A7A;
            letter-spacing: 3px;
            line-height: 1.4;
        }
        .sys-subtitle {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* Formula box */
        .formula-box {
            background: #f5f8ff;
            border: 1px solid #d0e0f8;
            border-radius: 10px;
            padding: 14px 16px;
        }
        .formula-label {
            font-size: 11px;
            color: #5a8ab5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .formula-main {
            font-size: 15px;
            color: #2b72ef;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
        }
        .formula-vars {
            margin-top: 8px;
            font-size: 11px;
            color: #666;
            line-height: 1.7;
        }

        /* Hazard levels */
        .hazard-section {}
        .section-title {
            font-size: 11px;
            color: #5a8ab5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .hazard-bar {
            display: flex;
            border-radius: 6px;
            overflow: hidden;
            height: 20px;
            margin-bottom: 8px;
        }
        .hazard-bar-seg {
            flex: 1;
        }
        .hazard-labels {
            display: flex;
            justify-content: space-between;
        }
        .hazard-label {
            font-size: 10px;
            color: #666;
            text-align: center;
            flex: 1;
            line-height: 1.3;
        }

        /* Feature tags */
        .feature-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag {
            background: #f0f5ff;
            border: 1px solid #c8dcf8;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            color: #2b72ef;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tag svg { width: 13px; height: 13px; flex-shrink: 0; }

        /* Intensity legend */
        .intensity-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .intensity-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #5a8ab5;
        }
        .intensity-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ─── Right login panel ─── */
        .login-panel {
            background: #ffffff;
            padding: 50px 48px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-heading {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-heading h2 {
            font-size: 22px;
            font-weight: 700;
            color: #003A7A;
            letter-spacing: 2px;
        }
        .login-heading p {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }
        .login-divider {
            width: 50px; height: 3px;
            background: linear-gradient(90deg, #2b72ef, #6aaeff);
            border-radius: 2px;
            margin: 10px auto 0;
        }

        .error-msg {
            background: rgba(255, 87, 34, 0.08);
            border: 1px solid rgba(255, 87, 34, 0.35);
            color: #d84315;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
            border-radius: 8px;
            padding: 8px 12px;
        }

        /* Override layui form styles for light theme */
        .layui-form-label {
            position: relative;
            float: left;
            display: block;
            padding: 9px 0;
            width: 75px;
            font-weight: 400;
            line-height: 20px;
            text-align: right;
            font-size: 14px;
            color: #333;
        }
        .layui-form-item {
            margin-bottom: 18px;
        }
        .layui-input-block .layui-input,
        .layui-input {
            height: 44px;
            background: #ffffff !important;
            border: 1px solid #c8dcf8 !important;
            border-radius: 8px !important;
            color: #333 !important;
            font-size: 14px;
            padding-left: 14px;
        }
        .layui-input::placeholder { color: #aaa !important; }
        .layui-input:focus {
            border-color: #2b72ef !important;
            box-shadow: 0 0 0 3px rgba(43,114,239,0.12) !important;
            outline: none;
            background: #f5f8ff !important;
        }
        .captcha-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .captcha-row .layui-input {
            width: 236px;
            height: 44px;
            flex-shrink: 0;
        }
        .captcha-img {
            cursor: pointer;
            height: 44px;
            min-width: 110px;
            border: 1px solid #c8dcf8;
            border-radius: 8px;
            vertical-align: middle;
            transition: opacity 0.2s;
        }
        .captcha-img:hover { opacity: 0.85; }

        .layui-btn {
            display: block;
            width: 93%;
            margin-left: 38px;
            height: 44px;
            line-height: 44px;
            border: none;
            padding: 0 18px;
            background: linear-gradient(90deg, #1a56e8, #2b72ef, #4a9aef) !important;
            color: #fff !important;
            white-space: nowrap;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 3px;
            border-radius: 8px !important;
            cursor: pointer;
            transition: opacity 0.2s, box-shadow 0.2s;
            -moz-user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }
        .layui-btn:hover {
            opacity: 0.9;
            box-shadow: 0 4px 20px rgba(43,114,239,0.35);
        }

        /* 登录按钮居中 */
        .login-panel .layui-form-item:last-child .layui-input-block {
            margin-left: 0;
            text-align: center;
        }

        /* ─── Footer ─── */
        .footer {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            background: linear-gradient(90deg, #d0e4f5, #e8f2fb);
            padding: 8px 20px;
            z-index: 20;
        }
        .footer-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            max-width: 960px;
            margin: 0 auto;
        }

        .footer-logo {
            width: 4.3%;
            height: auto;
            flex-shrink: 0;
            background: transparent;
            border-radius: 6px;
            padding: 4px;
            margin-right: -20px;
        }
        .footer-logo2 { width: 22%;  height: auto; flex-shrink: 0; background: transparent; border-radius: 6px; padding: 4px; }
        .footer-text  { font-size: 12px; line-height: 1.7; }
        .footer-text p { margin: 0; text-align: center; }
        .footer-text .authors   { font-size: 12px; color: #1a3a5c; letter-spacing: 1px; font-weight: 400;}
        .footer-text .copyright { font-size: 12px; color: #2c5278; font-weight: 600; }

        /* ─── Particle glow for canvas ─── */
        @keyframes glow-pulse {
            0%, 100% { opacity: 0.55; }
            50%       { opacity: 1;    }
        }

        /* Responsive */
        @media (max-width: 780px) {
            .info-panel { display: none; }
            .login-panel { padding: 36px 28px; }
            .page-card { max-width: 420px; }
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     Animated particle canvas (behind everything)
═══════════════════════════════════════════════════════════════ -->
<canvas id="bg-canvas"></canvas>

<!-- ═══════════════════════════════════════════════════════════════
     SVG Map background (external file, light theme)
═══════════════════════════════════════════════════════════════ -->
<img id="map-svg" src="/static/img/login_bg_map.svg" alt="Geographic map background with coordinate grid">

<!-- ═══════════════════════════════════════════════════════════════
     Main content
═══════════════════════════════════════════════════════════════ -->
<div class="main-content">
    <div class="page-card">

        <!-- ── Left info panel ── -->
        <div class="info-panel">
            <div class="sys-header">
                <div class="sys-icon">
                    <!-- Seismograph / wave icon -->
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="#2b72ef" stroke-width="1.5" opacity="0.6"/>
                        <polyline points="2,20 8,20 10,12 14,28 18,8 22,32 26,16 30,22 32,20 38,20"
                                  stroke="#00d4ff" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="sys-title">地震滑坡灾害<br>评估系统</div>
                <div class="sys-subtitle">Earthquake Landslide Hazard Assessment System</div>
            </div>

 

            <!-- Hazard level color bar -->
            <div class="hazard-section">
                <div class="section-title">危险性等级</div>
                <div class="hazard-bar">
                    <div class="hazard-bar-seg" style="background:#00A800;"></div>
                    <div class="hazard-bar-seg" style="background:#8CD200;"></div>
                    <div class="hazard-bar-seg" style="background:#FFD200;"></div>
                    <div class="hazard-bar-seg" style="background:#FF6400;"></div>
                    <div class="hazard-bar-seg" style="background:#C80000;"></div>
                </div>
                <div class="hazard-labels">
                    <span class="hazard-label">低度</span>
                    <span class="hazard-label">较低</span>
                    <span class="hazard-label">中等</span>
                    <span class="hazard-label">较高</span>
                    <span class="hazard-label">高度</span>
                </div>
            </div>

         

            <!-- Feature tags -->
            <div class="feature-tags">
                <div class="tag">
                    <svg viewBox="0 0 14 14" fill="none"><polyline points="1,7 3,4 5,9 7,2 9,10 11,5 13,7" stroke="#00d4ff" stroke-width="1.4" stroke-linejoin="round"/></svg>
                    Newmark 分析
                </div>
                <div class="tag">
                    <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="#00d4ff" stroke-width="1.2"/><circle cx="7" cy="7" r="2" fill="#00d4ff" opacity="0.7"/></svg>
                    危险性等级评估
                </div>
                <div class="tag">
                    <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="4" width="12" height="7" rx="1" stroke="#00d4ff" stroke-width="1.2"/><line x1="4" y1="4" x2="4" y2="11" stroke="#00d4ff" stroke-width="1"/><line x1="7" y1="4" x2="7" y2="11" stroke="#00d4ff" stroke-width="1"/><line x1="10" y1="4" x2="10" y2="11" stroke="#00d4ff" stroke-width="1"/></svg>
                    报告生成
                </div>
                 <div class="tag">
                    <svg viewBox="0 0 14 14" fill="none"><ellipse cx="7" cy="7" rx="5.5" ry="3.5" stroke="#00d4ff" stroke-width="1.2"/><ellipse cx="7" cy="7" rx="2.5" ry="1.5" stroke="#00d4ff" stroke-width="1.2"/></svg>
                    烈度计算
                </div>
                <div class="tag">
                    <svg viewBox="0 0 14 14" fill="none"><line x1="1" y1="7" x2="13" y2="7" stroke="#00d4ff" stroke-width="1.2" stroke-dasharray="3,2"/><line x1="7" y1="1" x2="7" y2="13" stroke="#00d4ff" stroke-width="1.2" stroke-dasharray="3,2"/></svg>
                    断层分析
                </div>
            </div>
        </div>

        <!-- ── Right login panel ── -->
        <div class="login-panel">
            <div class="login-heading">
                <h2>系统登录</h2>
               
            </div>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form class="layui-form" method="post" action="/login/">
                {% csrf_token %}
                <div class="layui-form-item">
                    <label class="layui-form-label">用户名</label>
                    <div class="layui-input-block">
                        <input type="text" name="username" required lay-verify="required"
                               placeholder="请输入用户名" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">密　码</label>
                    <div class="layui-input-block">
                        <input type="password" name="password" required lay-verify="required"
                               placeholder="请输入密码" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">验证码</label>
                    <div class="layui-input-block">
                        <div class="captcha-row">
                            <input type="text" name="captcha" required lay-verify="required"
                                   placeholder="请输入验证码" autocomplete="off" class="layui-input">
                            <img src="{{ captcha_img }}" class="captcha-img" id="captchaImg"
                                 title="点击刷新验证码" onclick="refreshCaptcha()">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item" style="margin-top:28px;">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="loginSubmit">登 录</button>
                    </div>
                </div>
            </form>
        </div>

    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     Footer
═══════════════════════════════════════════════════════════════ -->
<footer class="footer">
    <div class="footer-content">
        <img src="/static/img/logo_new.png"  class="footer-logo"  alt="系统Logo">
        <img src="/static/img/logo_new3.png" class="footer-logo2" alt="系统Logo">
        <div class="footer-text">
            <p class="authors">作者：蔡晓光 &nbsp; 徐洪路 &nbsp; 王威新 &nbsp; 高泽民 &nbsp; 彭达 &nbsp; 黄鑫 &nbsp; 李思汉</p>
            <p class="copyright">版权所有：中国地震灾害防御中心 &nbsp; 技术联系：010-69941228 &nbsp;15832605400 徐洪路</p>
        </div>
    </div>
</footer>

<script src="/static/layui/layui/layui.js"></script>
<script>
    /* ── Captcha refresh ── */
    function refreshCaptcha() {
        fetch('/captcha/')
            .then(response => response.json())
            .then(data => {
                document.getElementById('captchaImg').src = data.captcha_img;
            });
    }

    /* ── Particle / tech background canvas ── */
    (function () {
        var canvas = document.getElementById('bg-canvas');
        var ctx    = canvas.getContext('2d');
        var W, H, particles = [], PARTICLE_COUNT = 80;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function randomParticle() {
            return {
                x:  Math.random() * W,
                y:  Math.random() * H,
                r:  Math.random() * 1.4 + 0.3,
                vx: (Math.random() - 0.5) * 0.25,
                vy: (Math.random() - 0.5) * 0.25,
                alpha: Math.random() * 0.25 + 0.05
            };
        }
        for (var i = 0; i < PARTICLE_COUNT; i++) { particles.push(randomParticle()); }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(function (p) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(43,114,239,' + p.alpha + ')';
                ctx.fill();

                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = W;
                if (p.x > W) p.x = 0;
                if (p.y < 0) p.y = H;
                if (p.y > H) p.y = 0;
            });

            /* draw faint connections between nearby particles */
            for (var a = 0; a < particles.length; a++) {
                for (var b = a + 1; b < particles.length; b++) {
                    var dx = particles[a].x - particles[b].x;
                    var dy = particles[a].y - particles[b].y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.strokeStyle = 'rgba(43,114,239,' + (0.06 * (1 - dist / 100)) + ')';
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    })();
</script>
</body>
</html>
