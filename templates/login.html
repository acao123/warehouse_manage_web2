<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震滑坡灾害评估系统 - 登录</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/logo.png">
    <link rel="stylesheet" href="/static/layui/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/gov-theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
        }
        body {
            background-image: url("/static/img/login_backgroud.png");
            background-size: 100% 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
        }
        /* 深蓝渐变遮罩 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(22,90,167,0.85), rgba(14,74,138,0.9));
            z-index: 0;
        }
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        /* 毛玻璃登录框 */
        .login-container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 44px;
            border-radius: 12px;
            border: 1px solid rgba(58, 123, 213, 0.5);
            box-shadow: 0 8px 32px rgba(14, 74, 138, 0.45), 0 0 0 1px rgba(58,123,213,0.15) inset;
            width: 460px;
        }
        /* 系统图标区 */
        .login-logo {
            text-align: center;
            margin-bottom: 8px;
        }
        .login-logo i {
            font-size: 44px;
            color: rgba(255,255,255,0.9);
        }
        /* 登录标题 */
        .login-title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #ffffff, #a8c8f8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        /* 表单 label */
        .layui-form-label {
            position: relative;
            float: left;
            display: block;
            padding: 9px 0;
            width: 80px;
            font-weight: 400;
            line-height: 20px;
            text-align: right;
            font-size: 14px;
            color: rgba(255,255,255,0.9);
        }
        /* 输入框 */
        .layui-input {
            background: rgba(255,255,255,0.15) !important;
            border-color: rgba(58,123,213,0.5) !important;
            color: #fff !important;
        }
        .layui-input::placeholder {
            color: rgba(255,255,255,0.5) !important;
        }
        .layui-input:focus {
            background: rgba(255,255,255,0.2) !important;
            border-color: rgba(255,255,255,0.8) !important;
            box-shadow: 0 0 6px rgba(58,123,213,0.4) !important;
        }
        /* 登录按钮 */
        .layui-btn {
            background: linear-gradient(90deg, #165AA7, #3A7BD5) !important;
            border-color: transparent !important;
            color: #fff !important;
            letter-spacing: 4px;
            font-size: 15px;
            height: 42px;
            line-height: 42px;
            border-radius: 4px;
            box-shadow: 0 4px 12px rgba(22,90,167,0.5);
            transition: all 0.3s;
        }
        .layui-btn:hover {
            background: linear-gradient(90deg, #0E4A8A, #165AA7) !important;
            box-shadow: 0 6px 16px rgba(14,74,138,0.6);
            transform: translateY(-1px);
        }
        .captcha-img {
            cursor: pointer;
            height: 38px;
            border: 1px solid rgba(58,123,213,0.5);
            border-radius: 2px;
            vertical-align: middle;
        }
        .error-msg {
            color: #ffa07a;
            font-size: 12px;
            margin-bottom: 15px;
            text-align: center;
        }
        .captcha-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .captcha-row .layui-input {
            width: 150px;
            flex-shrink: 0;
        }
        /* 页脚样式 - 吸底 */
        .footer {
            width: 100%;
            background: rgba(14, 74, 138, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(58,123,213,0.3);
            padding: 12px 20px;
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 1;
        }
        .footer-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .footer-logo {
            width: 200px;
            height: auto;
            flex-shrink: 0;
        }
        .footer-text {
            color: rgba(200, 220, 255, 0.9);
            font-size: 12px;
            line-height: 1.8;
        }
        .footer-text p {
            margin: 0;
            text-align: center;
        }
        .footer-text .authors {
            letter-spacing: 1px;
            font-size: 13px;
        }
        .footer-text .copyright {
            color: rgba(180, 210, 255, 0.75);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="login-container">
            <div class="login-logo">
                <i class="layui-icon layui-icon-console"></i>
            </div>
            <div class="login-title">地震滑坡灾害评估系统</div>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form class="layui-form" method="post" action="/login/">
                {% csrf_token %}
                <div class="layui-form-item">
                    <label class="layui-form-label">用户名</label>
                    <div class="layui-input-block">
                        <input type="text" name="username" required lay-verify="required" 
                               placeholder="请输入用户名" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">密　码</label>
                    <div class="layui-input-block">
                        <input type="password" name="password" required lay-verify="required" 
                               placeholder="请输入密码" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">验证码</label>
                    <div class="layui-input-block">
                        <div class="captcha-row">
                            <input type="text" name="captcha" required lay-verify="required" 
                                   placeholder="请输入验证码" autocomplete="off" class="layui-input">
                            <img src="{{ captcha_img }}" class="captcha-img" id="captchaImg" 
                                 title="点击刷新验证码" onclick="refreshCaptcha()">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item" style="text-align: center;">
                    <button class="layui-btn" lay-submit lay-filter="loginSubmit" style="width: 180px;">登录</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 吸底页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <img src="/static/img/logo3.jpg" alt="中国地震灾害防御中心" class="footer-logo">
            <div class="footer-text">
                <p class="authors">作者：张三四 &nbsp; 王五六 &nbsp; 赵七八 &nbsp; 田八九 &nbsp; 何十一 &nbsp; 赵二 &nbsp; 田七 &nbsp; 李四</p>
                <p class="copyright">版权所有：中国地震灾害防御中心 &nbsp; 技术联系：010-69941228 &nbsp; 158***5400 徐XX</p>
            </div>
        </div>
    </footer>

    <script src="/static/layui/layui/layui.js"></script>
    <script>
        function refreshCaptcha() {
            fetch('/captcha/')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('captchaImg').src = data.captcha_img;
                });
        }
    </script>
</body>
</html>
