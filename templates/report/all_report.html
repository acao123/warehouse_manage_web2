<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有报告</title>
    <link rel="stylesheet" href="/static/layui/layui/css/layui.css">
    <style>
        /* 主题色按钮 */
        .layui-btn:not(.layui-btn-primary):not(.layui-btn-danger):not(.layui-btn-disabled) {
            background-color: #2b72ef !important;
            border-color: #2b72ef !important;
            color: #fff !important;
        }
        /* 表格优化 */
        .layui-table thead th {
            background-color: #edf4ff;
            font-size: 15px;
            font-weight: bold;
        }
        .layui-table tbody tr:hover td {
            background-color: #edf4ff !important;
        }
        .report-block {
            border: 1px solid #e2e2e2;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }
    </style>
</head>
<body>
<div style="padding: 15px;">
<div class="report-block">

    <!-- 搜索栏 -->
    <div class="layui-form" style="margin-bottom: 15px;">
        <div class="layui-inline">
            <input type="text" id="searchAddress" placeholder="参考位置" class="layui-input">
        </div>
        <div class="layui-inline">
            <input type="date" id="searchStartDate" placeholder="创建时间起" class="layui-input" style="width:150px;">
        </div>
        <span style="line-height:38px;margin:0 4px;">至</span>
        <div class="layui-inline">
            <input type="date" id="searchEndDate" placeholder="创建时间止" class="layui-input" style="width:150px;">
        </div>
        <div class="layui-inline">
            <button class="layui-btn layui-btn-sm" onclick="searchAllReport()"><i class="layui-icon layui-icon-search"></i> 搜索</button>
            <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="resetAllReport()"><i class="layui-icon layui-icon-refresh"></i> 重置</button>
            <button class="layui-btn layui-btn-sm layui-btn-danger" onclick="batchDelete()">
                <i class="layui-icon layui-icon-delete"></i> 批量删除
            </button>
        </div>
    </div>

    <!-- 数据表格 -->
    <table class="layui-hide" id="allReportTable" lay-filter="allReportTable"></table>
</div>
</div>

<!-- 任务状态列渲染模板 -->
<script type="text/html" id="statusTpl">
      {{#
         if(d.task_status == null || d.task_status == ''){
            return '';
        }
        var s = String(d.task_status);
        var statusText, color;
        if (s === '0')      { statusText = '刚创建';   color = '#999';
              return  '<span style="color:#070606">' + statusText + '</span>';
        }
        else if (s === '1') { statusText = '正在执行'; color = '#1E9FFF';
            return  '<span style="color:#1E9FFF">' + statusText + '</span>';
        }
        else if (s === '2') { statusText = '执行成功'; color = '#5FB878';
             return  '<span style="color:#5FB878">' + statusText + '</span>';
        }
        else if (s === '3') { statusText = '执行失败'; color = '#FF5722';
             return  '<span style="color:#FF5722">' + statusText + '</span>';
        }
        else                { statusText = s;          color = '';      
            return  '<span>' + statusText + '</span>';
        }
    }}
</script>

<!-- 操作列按钮模板 -->
<script type="text/html" id="allToolbar">
       {{#
        if(d.task_status == null || d.task_status == ''){
            return '';
        }
        var s = String(d.task_status);
         if (s === '1') {
            return '<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="stop">结束任务</a>';
        }
    }}

</script>

<script src="/static/layui/layui/layui.js"></script>
<script src="/static/js/jquery-3.6.0.min.js"></script>
<script>
    // CSRF Token 工具函数
    function getCookie(name) {
        var cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            var cookies = document.cookie.split(';');
            for (var i = 0; i < cookies.length; i++) {
                var cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    $.ajaxSetup({
        beforeSend: function(xhr, settings) {
            if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type)) {
                xhr.setRequestHeader("X-CSRFToken", getCookie('csrftoken'));
            }
        }
    });

    layui.use(['table', 'layer'], function(){
        var table = layui.table;
        var layer = layui.layer;

        // 渲染所有报告表格（开启多选）
        var allReportTable = table.render({
            elem: '#allReportTable',
            url: '/report/all/list/',
            page: true,
            height: 'full-70',
            cols: [[
                {type: 'checkbox', fixed: 'left'},
                {field: 'id',                title: 'ID',             width: 80, sort: true},
                {field: 'user_id',           title: '创建人ID',        width: 100},
                {field: 'ori_time',          title: '发震时刻',         width: 160},
                {field: 'longitude',         title: '经度',             width: 120},
                {field: 'latitude',          title: '纬度',             width: 120},
                {field: 'magnitude',         title: '震级',             width: 80},
                {field: 'address',           title: '参考位置',          minWidth: 150},
                {field: 'created_at',        title: '创建时间',          width: 160},
                {field: 'success_time',      title: '任务完成时间',       width: 160},
                {field: 'task_status',       title: '任务状态',          width: 100, templet: '#statusTpl'},
                {field: 'interp_method',     title: '插值算法',          width: 120},
                {field: 'sample_interval',   title: '等值线采样间隔',     width: 130},
                {field: 'max_sample_points', title: '最大采样点数',       width: 120},
                {fixed: 'right', title: '操作', toolbar: '#allToolbar', width: 100}
            ]]
        });

        // 监听工具条（结束任务）
        table.on('tool(allReportTable)', function(obj){
            var data = obj.data;
            if(obj.event === 'stop'){
                layer.confirm('确定要结束该任务吗？', {icon: 3, title: '结束确认'}, function(index){
                    $.post('/report/task/stop/', {task_id: data.id}, function(res){
                        if(res.code === 0){
                            layer.msg('任务已结束');
                            allReportTable.reload();
                        } else {
                            layer.msg(res.msg || '操作失败');
                        }
                    });
                    layer.close(index);
                });
            }
        });

        // 搜索
        window.searchAllReport = function(){
            allReportTable.reload({
                where: {
                    address:    $('#searchAddress').val(),
                    start_date: $('#searchStartDate').val(),
                    end_date:   $('#searchEndDate').val()
                },
                page: { curr: 1 }
            });
        };

        // 重置
        window.resetAllReport = function(){
            $('#searchAddress').val('');
            $('#searchStartDate').val('');
            $('#searchEndDate').val('');
            allReportTable.reload({ where: {}, page: { curr: 1 } });
        };

        // 批量删除
        window.batchDelete = function(){
            var checkStatus = table.checkStatus('allReportTable');
            var selected = checkStatus.data;
            if(selected.length === 0){
                layer.msg('请先选择要删除的任务'); return;
            }
            // 检查是否有正在执行的任务
            var hasRunning = selected.some(function(item){ return item.task_status === 1; });
            if(hasRunning){
                layer.msg('选中的任务中包含正在执行的任务，不允许删除'); return;
            }
            var ids = selected.map(function(item){ return item.id; });
            layer.confirm('确定删除选中的 ' + ids.length + ' 条任务吗？', {icon: 3, title: '删除确认'}, function(index){
                $.ajax({
                    url: '/report/task/delete/',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({task_ids: ids}),
                    success: function(res){
                        if(res.code === 0){
                            layer.msg(res.msg || '删除成功');
                            allReportTable.reload();
                        } else {
                            layer.msg(res.msg || '删除失败');
                        }
                    },
                    error: function(){
                        layer.msg('请求失败');
                    }
                });
                layer.close(index);
            });
        };
    });
</script>
</body>
</html>
