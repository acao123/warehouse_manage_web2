<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>执行报告</title>
    <link rel="stylesheet" href="/static/layui/layui/css/layui.css">
    <style>
        .report-block {
            border: 1px solid #e2e2e2;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }
        .report-block-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
            border-left: 3px solid #2b72ef;
            padding-left: 8px;
        }
        /* 折叠块 */
        .collapse-content {
            display: none;
        }
        .collapse-content.active {
            display: block;
        }
        /* 进度条区域 */
        .progress-section {
            margin-top: 15px;
            padding: 15px;
            border: 1px solid #e2e2e2;
            border-radius: 4px;
            background: #fafafa;
            display: none;
        }
        .progress-section.active {
            display: block;
        }
        /* 进度条容器，为跑马灯留顶部空间 */
        .progress-wrap {
            position: relative;
            padding-top: 6px;
        }
        /* 跑马灯动效条（仅在任务执行中/取消中显示） */
        .progress-runner {
            position: absolute;
            top: 0;
            left: 0;
            height: 4px;
            width: 60px;
            background: linear-gradient(90deg, transparent, #1E9FFF 50%, transparent);
            border-radius: 2px;
            display: none;
            animation: runnerMove 1.5s linear infinite;
        }
        @keyframes runnerMove {
            0%   { left: 0;              opacity: 0.8; }
            50%  {                        opacity: 1;   }
            100% { left: calc(100% - 60px); opacity: 0.8; }
        }
        .progress-runner.active {
            display: block;
        }
        /* 主题色按钮 */
        .layui-btn:not(.layui-btn-primary):not(.layui-btn-danger):not(.layui-btn-disabled) {
            background-color: #2b72ef !important;
            border-color: #2b72ef !important;
            color: #fff !important;
        }
        /* 表格优化 */
        .layui-table thead th {
            background-color: #edf4ff;
            font-size: 15px;
            font-weight: bold;
        }
        .layui-table tbody tr:hover td {
            background-color: #edf4ff !important;
        }
    </style>
</head>
<body>
<div style="padding: 15px;">

    <!-- ===== 任务创建区 ===== -->
    <div class="report-block">
        {% comment %}<div class="report-block-title">任务创建区</div>{% endcomment %}

        <!-- 第一块：基本信息 -->
        <div class="report-block">
            <div class="report-block-title">基本信息</div>
            <div class="layui-form">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label" style="width:57px;">经度</label>
                        <div class="layui-input-inline" style="width:200px;">
                            <input type="text" id="longitude" placeholder="103.36" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label" style="width:57px;">纬度</label>
                        <div class="layui-input-inline" style="width:160px;">
                            <input type="text" id="latitude" placeholder="34.09" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label" style="width:57px;">震级</label>
                        <div class="layui-input-inline" style="width:80px;">
                            <input type="text" id="magnitude" placeholder="7.0" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label" style="width:57px;">震源深度</label>
                        <div class="layui-input-inline" style="width:80px;">
                            <input type="text" id="foc_depth" placeholder="10.0" class="layui-input">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label" style="width:57px;">参考位置</label>
                        <div class="layui-input-inline" style="width:200px;">
                            <input type="text" id="address" placeholder="选填" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label" style="width:57px;">发震时刻</label>
                        <div class="layui-input-inline" style="width:160px;">
                            <input type="datetime-local" id="ori_time" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label" style="width:57px;">天地图</label>
                        <div class="layui-input-inline" style="width:200px;">
                            <input type="radio" name="cache_base_map" value="0" title="每次都下载" checked>
                            <input type="radio" name="cache_base_map" value="1" title="使用缓存底图">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 第二块：基本文件（默认折叠） -->
        <div class="report-block">
            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" id="toggleFiles">
                ﹀ 基本文件
            </button>
            <div class="collapse-content" id="filesContent" style="margin-top:12px;">
                <div class="layui-form">
                    <div class="layui-form-item">
                        <label class="layui-form-label" style="width:160px;">历史地震CSV文件</label>
                        <div class="layui-input-block">
                            <input type="file" id="history_record" accept=".csv" style="display:none;">
                            <button type="button" class="layui-btn layui-btn-sm" onclick="document.getElementById('history_record').click()">
                                <i class="layui-icon layui-icon-upload"></i> 选择文件
                            </button>
                            <span id="history_record_name" style="margin-left:10px;color:#666;font-size:12px;">未选择文件</span>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label" style="width:160px;">烈度KML文件</label>
                        <div class="layui-input-block">
                            <input type="file" id="intensity_kml" accept=".kml" style="display:none;">
                            <button type="button" class="layui-btn layui-btn-sm" onclick="document.getElementById('intensity_kml').click()">
                                <i class="layui-icon layui-icon-upload"></i> 选择文件
                            </button>
                            <span id="intensity_kml_name" style="margin-left:10px;color:#666;font-size:12px;">未选择文件</span>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label" style="width:160px;">PGA KML文件</label>
                        <div class="layui-input-block">
                            <input type="file" id="pga_kml" accept=".kml" style="display:none;">
                            <button type="button" class="layui-btn layui-btn-sm" onclick="document.getElementById('pga_kml').click()">
                                <i class="layui-icon layui-icon-upload"></i> 选择文件
                            </button>
                            <span id="pga_kml_name" style="margin-left:10px;color:#666;font-size:12px;">未选择文件</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 第三块：插值算法（默认折叠） -->
        <div class="report-block">
            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" id="toggleInterp">
                ﹀ 插值算法
            </button>
            <div class="collapse-content" id="interpContent" style="margin-top:12px;">
                <div class="layui-form">
                    <div class="layui-form-item">
                        <div class="layui-inline">
                            <label class="layui-form-label" style="width:120px;">插值算法</label>
                            <div class="layui-input-inline" style="width:200px;">
                                <select id="interp_method" class="layui-select">
                                    <option value="scipy_tin" selected>不规则三角网(qgis)</option>
                                       <option value="qgis_idw">反距离加权(qgis)</option>
                                     <option value="kriging">克里金</option>
                                    <option value="scipy_idw" >反距离加权(scipy)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-inline">
                            <label class="layui-form-label" style="width:120px;">等值线采样间隔</label>
                            <div class="layui-input-inline" style="width:200px;">
                                <input type="text" id="sample_interval" placeholder="不规则三角网为1，其他默认5" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label" style="width:120px;">最大采样点数</label>
                            <div class="layui-input-inline" style="width:200px;">
                                <input type="text" id="max_sample_points" placeholder="选填，正整数，默认1000" class="layui-input">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 创建按钮 -->
        <div style="text-align:center;margin-top:10px;">
            <button type="button" class="layui-btn" id="createTaskBtn" onclick="createTask()">
                <i class="layui-icon layui-icon-add-1"></i> 创建任务
            </button>
        </div>
    </div>

    <!-- ===== 正在执行的任务 table ===== -->
    <div class="report-block">
        <div class="report-block-title">正在执行的任务</div>
        <table class="layui-hide" id="runningTable" lay-filter="runningTable"></table>
    </div>

    <!-- ===== 任务进度条 ===== -->
    <div class="progress-section" id="progressSection">
        <div class="report-block-title">任务进度</div>
        <!-- 带动效的进度条容器 -->
        <div class="progress-wrap" id="progressWrap">
            <!-- 滚动跑马灯动效条（绝对定位在进度条顶部） -->
            <div class="progress-runner" id="progressRunner"></div>
            <!-- layui 进度条 -->
            <div class="layui-progress layui-progress-big"
                 lay-showpercent="true"
                 lay-filter="progressBar"
                 style="margin-top:4px;">
                <div class="layui-progress-bar" lay-percent="0%"></div>
            </div>
        </div>
        <!-- 进度文字 -->
        <p id="progressText"
           style="color:#333;font-size:13px;margin-top:8px;font-weight:bold;">
            等待任务执行...
        </p>
        <!-- message & error_message 信息区 -->
        <div id="progressMsgBox"
             style="margin-top:6px;padding:8px 12px;background:#f5f5f5;
                    border-radius:4px;font-size:12px;color:#555;
                    min-height:32px;word-break:break-all;display:none;">
        </div>
        <div id="progressErrBox"
             style="margin-top:6px;padding:8px 12px;background:#fff1f0;
                    border:1px solid #ffa39e;border-radius:4px;
                    font-size:12px;color:#cf1322;
                    word-break:break-all;display:none;">
        </div>
    </div>

</div>

<!-- 操作列按钮模板 -->
<script type="text/html" id="runningToolbar">
    <a class="layui-btn layui-btn-normal  layui-btn-xs" lay-event="execute">执行任务</a>
    <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="export">导出报告</a>
    <a class="layui-btn layui-btn-danger  layui-btn-xs" lay-event="stop">终止任务</a>
</script>

<script src="/static/layui/layui/layui.js"></script>
<script src="/static/js/jquery-3.6.0.min.js"></script>
<script>
    // ---- CSRF Token 配置 ----
    function getCookie(name) {
        var cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            var cookies = document.cookie.split(';');
            for (var i = 0; i < cookies.length; i++) {
                var cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    $.ajaxSetup({
        beforeSend: function(xhr, settings) {
            if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type)) {
                xhr.setRequestHeader("X-CSRFToken", getCookie('csrftoken'));
            }
        }
    });

    layui.use(['table', 'layer', 'element', 'form'], function(){
        var table  = layui.table;
        var layer  = layui.layer;
        var element = layui.element;

        // 渲染正在执行任务表格
        var runningTable = table.render({
            elem: '#runningTable',
            url: '/report/task/running/',
            page: true,
            height: 'auto',
            cols: [[
                {field: 'ori_time',          title: '发震时刻',       width: 160},
                {field: 'longitude',         title: '经度(°)',           width: 120},
                {field: 'latitude',          title: '纬度(°)',           width: 120},
                {field: 'magnitude',         title: '震级(M)',           width: 90},
                {field: 'foc_depth',         title: '深度(KM)',           width: 100},
                {field: 'address',           title: '参考位置',        minWidth: 170},
                {field: 'created_at',        title: '创建时间',        width: 160},
                {field: 'task_status_label', title: '状态',            width: 100},
                {field: 'progress',          title: '进度(%)',         width: 80},
                {field: 'interp_method',     title: '插值算法',        width: 120},
                {field: 'sample_interval',   title: '等值线采样间隔',   width: 130},
                {field: 'max_sample_points', title: '最大采样点数',    width: 120},
                {fixed: 'right', title: '操作', toolbar: '#runningToolbar', width: 238}
            ]]
        });

        // 监听表格操作事件
        table.on('tool(runningTable)', function(obj){
            var data = obj.data;
            if(obj.event === 'execute'){
                var loadIndex = layer.load(1, {shade: [0.3, '#000']});
                $.post('/report/task/execute/', {task_id: data.id}, function(res){
                    layer.close(loadIndex);
                    if(res.code === 0){
                        layer.msg('任务执行中，请从进度条查看进度');
                        runningTable.reload();
                        startProgressPolling(data.id);
                    } else {
                        layer.msg(res.msg || '操作失败');
                    }
                }).fail(function(){
                    layer.close(loadIndex);
                    layer.msg('请求失败，请重试');
                });
            } else if(obj.event === 'export'){
                // 导出报告
                if(data.task_status === 1){
                    layer.msg('任务正在执行，请稍后');
                    return;
                }
                if(data.task_status !== 2){
                    layer.msg('报告尚未生成，请先执行任务');
                    return;
                }
                window.location.href = '/report/task/download/?task_id=' + data.id;
            } else if(obj.event === 'stop'){
                layer.confirm('确定要结束该任务吗？', {icon: 3, title: '结束确认'}, function(index){
                    $.post('/report/task/stop/', {task_id: data.id}, function(res){
                        if(res.code === 0){
                            layer.msg('任务取消中，请稍后查看状态');
                            runningTable.reload();
                            stopProgressPolling();
                        } else {
                            layer.msg(res.msg || '操作失败');
                        }
                    });
                    layer.close(index);
                });
            }
        });

        // ---- 基本文件折叠/展开 ----
        var filesExpanded = false;
        document.getElementById('toggleFiles').onclick = function(){
            filesExpanded = !filesExpanded;
            var content = document.getElementById('filesContent');
            if(filesExpanded){
                content.classList.add('active');
                this.textContent = '︿ 基本文件';
            } else {
                content.classList.remove('active');
                this.textContent = '﹀ 基本文件';
            }
        };

        // ---- 插值算法折叠/展开 ----
        var interpExpanded = false;
        document.getElementById('toggleInterp').onclick = function(){
            interpExpanded = !interpExpanded;
            var content = document.getElementById('interpContent');
            if(interpExpanded){
                content.classList.add('active');
                this.textContent = '︿ 插值算法';
            } else {
                content.classList.remove('active');
                this.textContent = '﹀ 插值算法';
            }
        };

        // ---- 文件选择显示文件名 ----
        ['history_record', 'intensity_kml', 'pga_kml'].forEach(function(id){
            document.getElementById(id).addEventListener('change', function(){
                var nameEl = document.getElementById(id + '_name');
                nameEl.textContent = this.files.length > 0 ? this.files[0].name : '未选择文件';
            });
        });
    });

    // ---- 前端校验 ----
    function validateForm() {
        var longitude = $('#longitude').val().trim();
        var latitude  = $('#latitude').val().trim();
        var magnitude = $('#magnitude').val().trim();
        var sample_interval    = $('#sample_interval').val().trim();
        var max_sample_points  = $('#max_sample_points').val().trim();

        // 校验经度
        if(longitude !== ''){
            var lon = parseFloat(longitude);
            if(isNaN(lon) || lon < 0){
                layer.msg('经度必须为非负整数或小数'); return false;
            }
        }
        // 校验纬度
        if(latitude !== ''){
            var lat = parseFloat(latitude);
            if(isNaN(lat) || lat < 0){
                layer.msg('纬度必须为非负整数或小数'); return false;
            }
        }
        // 校验震级
        if(magnitude !== ''){
            var mag = parseFloat(magnitude);
            if(isNaN(mag) || mag < 0){
                layer.msg('震级必须为非负整数或小数'); return false;
            }
        }
        // 校验震源深度
        var foc_depth = $('#foc_depth').val().trim();
        if(foc_depth !== ''){
            var fd = parseFloat(foc_depth);
            if(isNaN(fd) || fd < 0){
                layer.msg('震源深度必须为非负整数或小数'); return false;
            }
        }
        // 校验文件
        var historyFile   = document.getElementById('history_record').files[0];
        var intensityFile = document.getElementById('intensity_kml').files[0];
        var pgaFile       = document.getElementById('pga_kml').files[0];

        if(!historyFile){ layer.msg('请上传历史地震CSV文件'); return false; }
        if(!intensityFile){ layer.msg('请上传烈度KML文件'); return false; }
        if(!pgaFile){ layer.msg('请上传PGA KML文件'); return false; }

        if(!historyFile.name.toLowerCase().endsWith('.csv')){
            layer.msg('历史地震文件后缀必须为 .csv'); return false;
        }
        if(!intensityFile.name.toLowerCase().endsWith('.kml')){
            layer.msg('烈度KML文件后缀必须为 .kml'); return false;
        }
        if(!pgaFile.name.toLowerCase().endsWith('.kml')){
            layer.msg('PGA KML文件后缀必须为 .kml'); return false;
        }

        var maxSize = 1 * 1024 * 1024 * 1024;
        if(historyFile.size > maxSize){ layer.msg('历史地震CSV文件大小不能超过1G'); return false; }
        if(intensityFile.size > maxSize){ layer.msg('烈度KML文件大小不能超过1G'); return false; }
        if(pgaFile.size > maxSize){ layer.msg('PGA KML文件大小不能超过1G'); return false; }

        // 校验等值线采样间隔
        if(sample_interval !== ''){
            var si = parseInt(sample_interval);
            if(isNaN(si) || si <= 0 || String(si) !== sample_interval){
                layer.msg('等值线采样间隔必须为正整数'); return false;
            }
        }
        // 校验最大采样点数
        if(max_sample_points !== ''){
            var mp = parseInt(max_sample_points);
            if(isNaN(mp) || mp <= 0 || String(mp) !== max_sample_points){
                layer.msg('最大采样点数必须为正整数'); return false;
            }
        }
        return true;
    }

    // ---- 创建任务 ----
    function createTask() {
        if(!validateForm()) return;

        var formData = new FormData();
        formData.append('longitude',         $('#longitude').val().trim());
        formData.append('latitude',          $('#latitude').val().trim());
        formData.append('magnitude',         $('#magnitude').val().trim());
        formData.append('foc_depth',          $('#foc_depth').val().trim());
        formData.append('cache_base_map',     $('input[name="cache_base_map"]:checked').val() || '0');
        formData.append('address',           $('#address').val().trim());
        formData.append('ori_time',          $('#ori_time').val().trim());
        formData.append('interp_method',     $('#interp_method').val());
        formData.append('sample_interval',   $('#sample_interval').val().trim());
        formData.append('max_sample_points', $('#max_sample_points').val().trim());
        formData.append('history_record',    document.getElementById('history_record').files[0]);
        formData.append('intensity_kml',     document.getElementById('intensity_kml').files[0]);
        formData.append('pga_kml',           document.getElementById('pga_kml').files[0]);

        var loadIdx = layer.load(1, {shade: [0.3, '#000']});
        $('#createTaskBtn').prop('disabled', true);

        $.ajax({
            url: '/report/task/create/',
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            headers: {'X-CSRFToken': getCookie('csrftoken')},
            success: function(res){
                layer.close(loadIdx);
                $('#createTaskBtn').prop('disabled', false);
                if(res.code === 0){
                    layer.msg('任务创建成功');
                    // 刷新正在执行的任务列表
                    layui.table.reload('runningTable');
                    // showProgress 不直接轮询（任务刚创建还未执行）
                } else {
                    layer.alert(res.msg || '创建失败', {icon: 2});
                }
            },
            error: function(){
                layer.close(loadIdx);
                $('#createTaskBtn').prop('disabled', false);
                layer.alert('请求失败，请检查网络或联系管理员', {icon: 2});
            }
        });
    }

    // ---- 进度条轮询逻辑 ----
    var _progressTimer  = null;   // 轮询定时器句柄
    var _currentTaskId  = null;   // 当前正在跟踪的任务ID

    /**
     * 开始轮询任务进度
     * @param {number} taskId - 要跟踪的任务ID
     */
    function startProgressPolling(taskId) {
        stopProgressPolling();      // 先清除旧的定时器
        _currentTaskId = taskId;
        showProgressSection();
        pollOnce(taskId);           // 立即查询一次
        _progressTimer = setInterval(function() {
            pollOnce(taskId);
        }, 3000);                   // 每3秒查询一次
    }

    /**
     * 停止进度轮询
     */
    function stopProgressPolling() {
        if (_progressTimer) {
            clearInterval(_progressTimer);
            _progressTimer = null;
        }
        _currentTaskId = null;
        var runner = document.getElementById('progressRunner');
        if (runner) runner.classList.remove('active');
    }

    /**
     * 执行一次进度查询
     * @param {number} taskId - 任务ID
     */
    function pollOnce(taskId) {
        $.get('/report/task/progress/', {task_id: taskId}, function(res) {
            if (res.code !== 0) {
                stopProgressPolling();
                return;
            }
            var d = res.data;
            // progress 值：1-14 为步骤进度，99 报告完成，100 全部完成
            // 显示百分比：progress=1→约7%，progress=14→100%（线性映射至14步），99/100直接显示
            var pct;
            if (d.progress >= 100) {
                pct = 100;
            } else if (d.progress >= 99) {
                pct = 99;
            } else if (d.progress > 0) {
                // 步骤进度：1-14 映射到 5%-95%
                pct = Math.min(Math.round(d.progress / 14 * 90 + 5), 95);
            } else {
                pct = 0;
            }

            updateProgressUI(pct, d.task_status, d.message, d.error_message);

            // 任务结束（非执行中/取消中）时停止轮询
            if (d.task_status !== 1 && d.task_status !== 4) {
                stopProgressPolling();
                {#runningTable.reload();#}
                // 延迟2秒后自动刷新页面，让用户看到最终进度状态
                setTimeout(function() {
                    window.location.reload();
                }, 2000);
            }
        }).fail(function() {
            // 网络错误不停止轮询，下次继续重试
            console.warn('进度查询请求失败，将在下次重试');
        });
    }

    /**
     * 更新进度条 UI
     * @param {number} pct          - 进度百分比（0-100）
     * @param {number} taskStatus   - 任务状态
     * @param {string} message      - 进度描述信息
     * @param {string} errorMessage - 错误信息
     */
    function updateProgressUI(pct, taskStatus, message, errorMessage) {
        layui.element.progress('progressBar', pct + '%');

        // 进度文字
        var statusText = '';
        if      (taskStatus === 0) statusText = '待执行';
        else if (taskStatus === 1) statusText = '执行中';
        else if (taskStatus === 2) statusText = '执行成功';
        else if (taskStatus === 3) statusText = '执行失败';
        else if (taskStatus === 4) statusText = '取消中';

        document.getElementById('progressText').textContent =
            '任务状态：' + statusText + '  进度：' + pct + '%';

        // 跑马灯：仅在执行中/取消中时显示
        var runner = document.getElementById('progressRunner');
        if (taskStatus === 1 || taskStatus === 4) {
            runner.classList.add('active');
        } else {
            runner.classList.remove('active');
        }

        // message 信息区
        var msgBox = document.getElementById('progressMsgBox');
        if (message) {
            msgBox.style.display = 'block';
            msgBox.textContent = message;
        } else {
            msgBox.style.display = 'none';
        }

        // error_message 信息区
        var errBox = document.getElementById('progressErrBox');
        if (errorMessage) {
            errBox.style.display = 'block';
            errBox.textContent = '错误信息：' + errorMessage;
        } else {
            errBox.style.display = 'none';
        }
    }

    /**
     * 显示进度条区域并激活跑马灯
     */
    function showProgressSection() {
        document.getElementById('progressSection').classList.add('active');
        document.getElementById('progressRunner').classList.add('active');
    }

    // ---- 创建任务成功后启动进度轮询 ----
    // （showProgress 保留原名以兼容 createTask 中的调用）
    function showProgress(taskId) {
        startProgressPolling(taskId);
    }

    function hideProgress(){
        stopProgressPolling();
        var section = document.getElementById('progressSection');
        section.classList.remove('active');
        layui.element.progress('progressBar', '0%');
        document.getElementById('progressText').textContent = '等待任务执行...';
        document.getElementById('progressMsgBox').style.display = 'none';
        document.getElementById('progressErrBox').style.display = 'none';
    }

    // ---- 页面加载后检查是否有正在执行的任务，如有则自动开始轮询 ----
    $(document).ready(function() {
        $.get('/report/task/running/', {page: 1, limit: 1}, function(res) {
            if (res.code === 0 && res.data && res.data.length > 0) {
                var t = res.data[0];
                if (t.task_status === 1 || t.task_status === 4) {
                    startProgressPolling(t.id);
                }
            }
        });
    });
</script>
</body>
</html>
