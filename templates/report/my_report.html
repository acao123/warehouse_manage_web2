<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的报告</title>
    <link rel="stylesheet" href="/static/layui/layui/css/layui.css">
    <style>
        /* 主题色按钮 */
        .layui-btn:not(.layui-btn-primary):not(.layui-btn-danger):not(.layui-btn-disabled) {
            background-color: #2b72ef !important;
            border-color: #2b72ef !important;
            color: #fff !important;
        }
        /* 表格优化 */
        .layui-table thead th {
            background-color: #edf4ff;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
        }
        .layui-table tbody td {
            text-align: center;
        }
        .layui-table tbody tr:hover td {
            background-color: #edf4ff !important;
        }
        .report-block {
            border: 1px solid #e2e2e2;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }
    </style>
</head>
<body>
<div style="padding: 15px;">
<div class="report-block">

    <!-- 搜索栏 -->
    <div class="layui-form" style="margin-bottom: 15px;">
        <div class="layui-inline">
            <input type="text" id="searchAddress" placeholder="参考位置" class="layui-input">
        </div>
        <div class="layui-inline">
            <input type="date" id="searchStartDate" placeholder="创建时间起" class="layui-input" style="width:150px;">
        </div>
        <span style="line-height:38px;margin:0 4px;">至</span>
        <div class="layui-inline">
            <input type="date" id="searchEndDate" placeholder="创建时间止" class="layui-input" style="width:150px;">
        </div>
        <div class="layui-inline">
            <button class="layui-btn layui-btn-sm" onclick="searchMyReport()"><i class="layui-icon layui-icon-search"></i> 搜索</button>
            <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="resetMyReport()"><i class="layui-icon layui-icon-refresh"></i> 重置</button>
        </div>
    </div>

    <!-- 数据表格 -->
    <table class="layui-hide" id="myReportTable" lay-filter="myReportTable"></table>
</div>
</div>

<!-- 任务状态列渲染模板 -->
<script type="text/html" id="statusTpl">
    {{#
         if(d.task_status == null || d.task_status == ''){
            return '';
        }
        var s = String(d.task_status);
        var statusText, color;
        if (s === '0')      { statusText = '刚创建';   color = '#999';
              return  '<span style="color:#070606">' + statusText + '</span>';
        }
        else if (s === '1') { statusText = '正在执行'; color = '#1E9FFF';
            return  '<span style="color:#1E9FFF">' + statusText + '</span>';
        }
        else if (s === '2') { statusText = '执行成功'; color = '#5FB878';
             return  '<span style="color:#5FB878">' + statusText + '</span>';
        }
        else if (s === '3') { statusText = '执行失败'; color = '#FF5722';
             return  '<span style="color:#FF5722">' + statusText + '</span>';
        }
       else if (s === '4') { statusText = '任务终止中'; color = '#999';
             return  '<span style="color:#070606">' + statusText + '</span>';
        }
        else                { statusText = s;          color = '';      
            return  '<span>' + statusText + '</span>';
        }
    }}
    
</script>

<script src="/static/layui/layui/layui.js"></script>
<script src="/static/js/jquery-3.6.0.min.js"></script>
<script>
    layui.use(['table', 'layer'], function(){
        var table = layui.table;

        // 渲染我的报告表格
        var myReportTable = table.render({
            elem: '#myReportTable',
            url: '/report/my/list/',
            page: true,
            height: 'full-70',
            cols: [[
                {field: 'ori_time',          title: '发震时刻',       width: 160},
                {field: 'longitude',         title: '经度(°)',           width: 120},
                {field: 'latitude',          title: '纬度(°)',           width: 120},
                {field: 'magnitude',         title: '震级(M)',           width: 90},
                {field: 'foc_depth',         title: '深度(KM)',           width: 100},
                {field: 'address',           title: '参考位置',        minWidth: 170},
                {field: 'created_at',        title: '创建时间',        width: 160},
                {field: 'success_time',      title: '任务完成时间',    width: 160},
                {field: 'task_status',       title: '任务状态',        width: 100, templet: '#statusTpl'},
                {field: 'interp_method',     title: '插值算法',        width: 120},
                {field: 'sample_interval',   title: '等值线采样间隔',   width: 130},
                {field: 'max_sample_points', title: '最大采样点数',    width: 120}
            ]]
        });

        // 搜索
        window.searchMyReport = function(){
            myReportTable.reload({
                where: {
                    address:    $('#searchAddress').val(),
                    start_date: $('#searchStartDate').val(),
                    end_date:   $('#searchEndDate').val()
                },
                page: { curr: 1 }
            });
        };

        // 重置
        window.resetMyReport = function(){
            $('#searchAddress').val('');
            $('#searchStartDate').val('');
            $('#searchEndDate').val('');
            myReportTable.reload({ where: {}, page: { curr: 1 } });
        };
    });
</script>
</body>
</html>
