<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户表单</title>
    <link rel="stylesheet" href="/static/layui/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/gov-theme.css">
</head>
<body style="padding: 15px;">
<form class="layui-form" id="userForm" lay-filter="userForm">
     {% csrf_token %}
    <input type="hidden" name="id" id="userId">

    <div class="layui-form-item">
        <label class="layui-form-label">用户昵称</label>
        <div class="layui-input-block">
            <input type="text" name="nickname" required lay-verify="required"
                   placeholder="请输入用户昵称" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">归属部门</label>
        <div class="layui-input-block">
            <select name="department" lay-verify="required">
                <option value="">请选择部门</option>
                <option value="总部">总部</option>
                <option value="总部-研发">总部-研发</option>
                <option value="总部-研发-产研">总部-研发-产研</option>
            </select>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">手机号码</label>
        <div class="layui-input-block">
            <input type="text" name="phone" placeholder="请输入手机号码" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">用户名称</label>
        <div class="layui-input-block">
            <input type="text" name="username" id="username" required lay-verify="required"
                   placeholder="请输入用户名称" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">密码</label>
        <div class="layui-input-block">
            <input type="password" name="password" id="password"
                   placeholder="请输入密码（编辑时留空表示不修改）" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">用户性别</label>
        <div class="layui-input-block">
            <input type="radio" name="gender" value="male" title="男" checked>
            <input type="radio" name="gender" value="female" title="女">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">用户状态</label>
        <div class="layui-input-block">
            <input type="radio" name="status" value="active" title="正常" checked>
            <input type="radio" name="status" value="inactive" title="停用">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">岗位</label>
        <div class="layui-input-block">
            <input type="text" name="position" placeholder="请输入岗位" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">角色</label>
        <div class="layui-input-block" id="roleCheckbox">
            <!-- 角色复选框将动态加载 -->
        </div>
    </div>
</form>

<script src="/static/layui/layui/layui.js"></script>
<script src="/static/js/jquery-3.6.0.min.js"></script>
<script>
     // 全局设置：让所有 $.post / $.ajax 自动携带 CSRF token
        function getCookie(name) {
            var cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                var cookies = document.cookie.split(';');
                for (var i = 0; i < cookies.length; i++) {
                    var cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        $.ajaxSetup({
            beforeSend: function(xhr, settings) {
                if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type)) {
                    xhr.setRequestHeader("X-CSRFToken", getCookie('csrftoken'));
                }
            }
        });
    layui.use(['form', 'layer'], function () {
        var form = layui.form;
        var layer = layui.layer;

        // 获取URL参数
        function getUrlParam(name) {
            var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return unescape(r[2]);
            return null;
        }

        var userId = getUrlParam('id');

        // 加载所有角色
        $.get('/system/role/all/', function (res) {
            if (res.code === 0) {
                var html = '';
                res.data.forEach(function (role) {
                    html += '<input type="checkbox" name="role_ids[]" value="' + role.id + '" title="' + role.role_name + '">';
                });
                $('#roleCheckbox').html(html);
                form.render('checkbox');

                // 如果是编辑模式，加载用户数据
                if (userId) {
                    loadUserData(userId);
                }
            }
        });

        // 加载用户数据
        function loadUserData(id) {
            $.get('/system/user/edit/', {id: id}, function (res) {
                if (res.code === 0) {
                    var data = res.data;
                    $('#userId').val(data.id);
                    $('input[name="nickname"]').val(data.nickname);
                    $('select[name="department"]').val(data.department);
                    $('input[name="phone"]').val(data.phone);
                    $('input[name="username"]').val(data.username).attr('readonly', true);
                    $('input[name="gender"][value="' + data.gender + '"]').prop('checked', true);
                    $('input[name="status"][value="' + data.status + '"]').prop('checked', true);
                    $('input[name="position"]').val(data.position);

                    // 设置角色选择
                    data.role_ids.forEach(function (roleId) {
                        $('input[name="role_ids[]"][value="' + roleId + '"]').prop('checked', true);
                    });

                    form.render();
                }
            });
        }

        // 提交表单
        window.submitForm = function (callback) {
            var formData = $('#userForm').serialize();
            var userId = $('#userId').val();
            var url = userId ? '/system/user/edit/' : '/system/user/add/';

            // 如果是新增，验证密码
            if (!userId && !$('input[name="password"]').val()) {
                layer.msg('请输入密码');
                return;
            }

            $.post(url, formData, function (res) {
                if (res.code === 0) {
                    layer.msg(res.msg);
                    callback();
                } else {
                    layer.msg(res.msg);
                }
            });
        };
    });
</script>
</body>
</html>
